<!DOCTYPE html>
<html>
<head>
    <title>Sudoku Rival - 중급</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        /* 간단한 레이아웃 스타일 */
        #sudoku-grid { display: grid; grid-template-columns: repeat(9, 40px); gap: 2px; margin-top: 20px; }
        .cell { width: 40px; height: 40px; text-align: center; font-size: 20px; }
        .fixed { background-color: #eee; font-weight: bold; }
        .correct { background-color: #c8e6c9; }
        .wrong { background-color: #ffcdd2; }
    </style>
</head>
<body>
    <h1>🧩 Sudoku Rival (Intermediate)</h1>

    <div id="login-area">
        <input type="text" id="username" placeholder="닉네임 입력">
        <button onclick="login()">접속하기</button>
    </div>
    
    <div id="lobby" style="display:none;">
        <p>내 아이디: <b id="display-my-id"></b></p>
        <input type="text" id="target-id" placeholder="친구 아이디 입력">
        <button onclick="sendInvite()">초대장 보내기</button>
    </div>

    <div id="game-area" style="display:none;">
        <h3 id="score-board">게임 시작! 숫자를 채워보세요.</h3>
        <div id="sudoku-grid"></div>
    </div>

    <script>
        const socket = io();
        let myId, currentRoom;

        function login() {
            myId = document.getElementById('username').value;
            if(!myId) return alert("닉네임을 입력하세요!");
            
            socket.emit('login', {username: myId});
            document.getElementById('display-my-id').innerText = myId;
            document.getElementById('login-area').style.display = 'none';
            document.getElementById('lobby').style.display = 'block';
            console.log("로그인 성공: " + myId);
        }

        function sendInvite() {
            const target = document.getElementById('target-id').value;
            if(!target) return alert("상대방 아이디를 입력하세요!");
            socket.emit('invite_player', {target: target, from_user: myId});
            alert(target + "님에게 초대를 보냈습니다!");
        }

        socket.on('receive_invite', (data) => {
            if(confirm(data.from + "님의 초대를 수락할까요?")) {
                socket.emit('accept_invite', {p1: data.from, p2: myId});
            }
        });

        socket.on('game_start', (data) => {
            currentRoom = data.room;
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            renderBoard(data.puzzle);
        });

        function renderBoard(puzzle) {
            const grid = document.getElementById('sudoku-grid');
            grid.innerHTML = '';
            puzzle.split('').forEach((num, i) => {
                const input = document.createElement('input');
                input.className = 'cell';
                input.type = 'number';
                if(num !== '0') {
                    input.value = num;
                    input.classList.add('fixed');
                    input.disabled = true;
                } else {
                    input.oninput = (e) => {
                        const val = e.target.value;
                        if(val >= 1 && val <= 9) {
                            socket.emit('check_number', {
                                room: currentRoom, username: myId, index: i, value: val
                            });
                        }
                    };
                }
                grid.appendChild(input);
            });
        }

        socket.on('result', (data) => {
            const cells = document.getElementsByClassName('cell');
            if(data.is_correct) {
                cells[data.idx].classList.add('correct');
                cells[data.idx].disabled = true;
            } else {
                cells[data.idx].classList.add('wrong');
                setTimeout(() => {
                    cells[data.idx].classList.remove('wrong');
                    cells[data.idx].value = '';
                }, 500);
            }
        });

        socket.on('opponent_progress', (data) => {
            document.getElementById('score-board').innerText = `상대방(${data.user})이 한 칸 더 맞췄습니다!`;
        });
    </script>
</body>
</html>
