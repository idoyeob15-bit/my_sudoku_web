<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Sudoku Rival</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; text-align: center; padding: 20px; }
        #sudoku-grid { 
            display: grid; grid-template-columns: repeat(9, 45px); grid-template-rows: repeat(9, 45px); 
            justify-content: center; margin: 20px auto; border: 3px solid #333; width: fit-content;
        }
        .cell { width: 45px; height: 45px; text-align: center; border: 1px solid #ccc; font-size: 20px; outline: none; box-sizing: border-box; }
        /* 3x3 박스 강조 */
        .cell:nth-child(9n+3), .cell:nth-child(9n+6) { border-right: 3px solid #333; }
        .cell:nth-child(n+19):nth-child(-n+27), .cell:nth-child(n+46):nth-child(-n+54) { border-bottom: 3px solid #333; }
        
        .fixed { background-color: #eee; font-weight: bold; }
        .correct { background-color: #dff0d8 !important; }
        .wrong { background-color: #f2dede !important; }
        #life-display { font-size: 24px; color: #e74c3c; margin: 10px; }
        .invite-box { background: #fff3cd; padding: 15px; border: 2px solid #ffeeba; border-radius: 10px; margin: 10px auto; width: 300px; }
    </style>
</head>
<body>
    <h1>🧩 Sudoku Rival</h1>

    <div id="login-area">
        <input type="text" id="username" placeholder="닉네임 입력">
        <button onclick="login()">접속하기</button>
    </div>
    
    <div id="lobby" style="display:none;">
        <p>나의 ID: <b id="my-id"></b></p>
        <input type="text" id="target-id" placeholder="상대방 아이디">
        <button onclick="sendInvite()">초대장 보내기</button>
        <div id="invite-list"></div>
    </div>

    <div id="game-area" style="display:none;">
        <div id="life-display">❤️❤️❤️</div>
        <h3 id="status">상대보다 먼저 완성하세요!</h3>
        <div id="sudoku-grid"></div>
    </div>

    <script>
        const socket = io();
        let myId, currentRoom, lives = 3;

        function login() {
            myId = document.getElementById('username').value;
            if(!myId) return alert("닉네임을 입력하세요!");
            socket.emit('login', {username: myId});
            document.getElementById('my-id').innerText = myId;
            document.getElementById('login-area').style.display = 'none';
            document.getElementById('lobby').style.display = 'block';
        }

        function sendInvite() {
            const target = document.getElementById('target-id').value;
            socket.emit('invite_player', {target: target, from_user: myId});
            alert(target + "님에게 초대를 보냈습니다. 상대가 수락할 때까지 기다리세요.");
        }

        socket.on('receive_invite', (data) => {
            const list = document.getElementById('invite-list');
            const box = document.createElement('div');
            box.className = "invite-box";
            box.innerHTML = `
                <b>${data.from}</b>님의 초대!<br>
                <button onclick="acceptInvite('${data.from}')">수락</button>
                <button onclick="this.parentElement.remove()">거절</button>
            `;
            list.appendChild(box);
        });

        function acceptInvite(fromUser) {
            socket.emit('accept_invite', {p1: fromUser, p2: myId});
        }

        // 서버에서 게임 시작 신호를 받으면 화면 전환 및 보드 렌더링
        socket.on('game_start', (data) => {
            console.log("게임 시작 신호 받음!", data);
            currentRoom = data.room;
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('game-area').style.display = 'block';
            renderBoard(data.puzzle);
        });

        function renderBoard(puzzle) {
            const grid = document.getElementById('sudoku-grid');
            grid.innerHTML = ''; // 기존 내용 삭제
            puzzle.split('').forEach((num, i) => {
                const input = document.createElement('input');
                input.className = 'cell' + (num !== '0' ? ' fixed' : '');
                input.value = (num !== '0') ? num : '';
                input.disabled = (num !== '0');
                
                if(num === '0') {
                    input.oninput = (e) => {
                        const val = e.target.value;
                        if(val >= "1" && val <= "9") {
                            socket.emit('check_number', { room: currentRoom, username: myId, index: i, value: val });
                        } else { e.target.value = ""; }
                    };
                }
                grid.appendChild(input);
            });
        }

        socket.on('result', (data) => {
            const cells = document.getElementsByClassName('cell');
            if(data.is_correct) {
                cells[data.idx].classList.add('correct');
                cells[data.idx].disabled = true;
            } else {
                lives--;
                document.getElementById('life-display').innerText = "❤️".repeat(lives) + "🖤".repeat(3-lives);
                cells[data.idx].classList.add('wrong');
                if(lives <= 0) {
                    socket.emit('game_over', {room: currentRoom, username: myId});
                    alert("탈락하셨습니다!");
                    location.reload();
                } else {
                    setTimeout(() => { cells[data.idx].classList.remove('wrong'); cells[data.idx].value = ''; }, 400);
                }
            }
        });

        socket.on('opponent_eliminated', (data) => {
            alert("상대방이 3회 실패로 탈락했습니다. 당신의 승리입니다!");
            location.reload();
        });

        socket.on('error_msg', (data) => alert(data.msg));
    </script>
</body>
</html>
